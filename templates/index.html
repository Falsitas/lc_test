<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LangChain Chat UI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        #chat-container {
            width: 500px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        #chat-box {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
        }

        .message {
            margin: 5px 0;
        }

        .user {
            text-align: right;
            color: blue;
        }

        .bot {
            text-align: left;
            color: green;
        }

        #input-area {
            display: flex;
        }

        #input {
            flex: 1;
            padding: 8px;
        }

        #login-area {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fafafa;
        }

        #login-area div {
            margin-bottom: 10px;
        }

        #login-area input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #login-area button {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #login-area button:hover {
            background: #0056b3;
        }

        #login-status {
            text-align: center;
            color: #28a745;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <h2>LangChain Chat</h2>

    <div id="login-area">
        <div id="login-form">
            <h3>로그인</h3>
            <div>
                <input id="username" type="text" placeholder="아이디" />
            </div>
            <div>
                <input id="password" type="password" placeholder="비밀번호" />
            </div>
            <div>
                <button onclick="login()">로그인</button>
            </div>
        </div>
        <div id="login-status" style="display:none;">
            <p>로그인되었습니다!</p>
            <button onclick="logout()">로그아웃</button>
        </div>
    </div>

    <div id="chat-box"></div>

    <div id="input-area">
        <input id="input" type="text" placeholder="메시지 입력..." />
        <button onclick="sendMessage()">전송</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chat-box");
    const loginForm = document.getElementById("login-form");
    const loginStatus = document.getElementById("login-status");

    function addMessage(text, className) {
        const div = document.createElement("div");
        div.className = "message " + className;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function updateLoginUI() {
        const accessToken = localStorage.getItem("accessToken");
        if (accessToken) {
            loginForm.style.display = "none";
            loginStatus.style.display = "block";
        } else {
            loginForm.style.display = "block";
            loginStatus.style.display = "none";
        }
    }

    async function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!username || !password) {
            alert("아이디와 비밀번호를 모두 입력해주세요.");
            return;
        }

        try {
            const response = await fetch("users/login/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ username, password })
            });

            if (!response.ok) {
                const errorData = await response.json();
                alert(errorData.detail || "로그인에 실패했습니다.");
                return;
            }

            const data = await response.json();
            localStorage.setItem("accessToken", data.access);
            updateLoginUI();
            addMessage(`${username}님이 로그인했습니다.`, "bot");
        } catch (error) {
            alert("로그인 요청 중 오류가 발생했습니다.");
            console.error(error);
        }
    }

    function logout() {
        localStorage.removeItem("accessToken");
        updateLoginUI();
        addMessage("로그아웃되었습니다.", "bot");
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
    }

    async function sendMessage() {
        const input = document.getElementById("input");
        const text = input.value.trim();

        if (!text) return;

        addMessage(text, "user");
        input.value = "";

        try {
            const headers = {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${localStorage.getItem("accessToken")}`
            };

            const response = await fetch("chat/", {
                method: "POST",
                headers: headers,
                body: JSON.stringify({ query: text })
            });

            const data = await response.json();
            addMessage(data.response, "bot");

        } catch (error) {
            addMessage("에러 발생", "bot");
            console.error(error);
        }
    }

    // Enter 키로 전송
    document.getElementById("input").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });
</script>

</body>
</html>
